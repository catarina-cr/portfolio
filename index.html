document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t;],&quot;default&quot;:&quot;dusk&quot;,&quot;tsType&quot;:&quot;'dusk'|'sunset'|'mint'&quot;},&quot;ownerName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Catarina&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showStickies&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { active: null, navOpen: false, navExpand: false, isMobile: false, now: new Date(), playing: true, progress: 34 };\n\n  componentDidMount() {\n    this.applyTheme();\n    this.applyResponsive();\n    this._onResize = () => this.applyResponsive();\n    window.addEventListener('resize', this._onResize);\n    this._clock = setInterval(() => this.setState({ now: new Date() }), 20000);\n    this._tick = setInterval(() => {\n      if (this.state.playing) this.setState(s => ({ progress: (s.progress + 0.45) % 100 }));\n    }, 1000);\n  }\n  componentDidUpdate(prevProps) {\n    if (!prevProps || prevProps.theme !== this.props.theme) this.applyTheme();\n  }\n  componentWillUnmount() {\n    clearInterval(this._clock); clearInterval(this._tick); this.stopSpin();\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  applyResponsive() {\n    const mobile = window.innerWidth <= 720;\n    const el = this.rootEl;\n    if (el) {\n      const set = (k, v) => el.style.setProperty(k, v);\n      if (mobile) {\n        set('--m-left', '0'); set('--m-tx', '0'); set('--m-top', '28px');\n        set('--m-w', '100vw'); set('--m-h', 'calc(100vh - 28px)'); set('--m-radius', '0');\n      } else {\n        set('--m-left', 'calc(50vw + 64px)'); set('--m-tx', '-50%'); set('--m-top', '40px');\n        set('--m-w', 'min(1040px,calc(100vw - 132px))'); set('--m-h', 'calc(100vh - 52px)'); set('--m-radius', '10px');\n      }\n    }\n    if (mobile !== this.state.isMobile) this.setState({ isMobile: mobile, navOpen: mobile ? this.state.navOpen : false });\n  }\n\n  startSpin() {\n    if (this._raf) return;\n    const step = () => {\n      if (this.state.playing) this.angle = ((this.angle || 0) + 0.5) % 360;\n      if (this.vinyl) this.vinyl.style.transform = 'rotate(' + (this.angle || 0) + 'deg)';\n      this._raf = requestAnimationFrame(step);\n    };\n    this._raf = requestAnimationFrame(step);\n  }\n  stopSpin() { if (this._raf) { cancelAnimationFrame(this._raf); this._raf = null; } }\n\n  themes = {\n    dusk:   { wall: 'linear-gradient(160deg,#d4b0e8 0%,#9ac0e8 55%,#c0d0f8 100%)', accent: '#7c3aed', accent2: '#b040a0', soft: '#ede9fe', soft2: '#f4f0fc', ink: '#1a0f2e', menu: 'rgba(240,236,248,.92)' },\n    sunset: { wall: 'linear-gradient(160deg,#f6b89a 0%,#e98aa6 55%,#f3b9cf 100%)', accent: '#cf432e', accent2: '#e08a3a', soft: '#ffe6da', soft2: '#fff4ee', ink: '#3a1409', menu: 'rgba(250,240,236,.92)' },\n    mint:   { wall: 'linear-gradient(160deg,#9fe6cf 0%,#7cc0e6 55%,#bbe8f2 100%)', accent: '#0d9488', accent2: '#2d8acb', soft: '#d6f2ec', soft2: '#eefaf7', ink: '#0c2b26', menu: 'rgba(236,248,245,.92)' },\n  };\n  applyTheme() {\n    const t = this.themes[this.props.theme] || this.themes.dusk;\n    const el = this.rootEl;\n    if (!el) return;\n    Object.entries(t).forEach(([k, v]) => el.style.setProperty('--' + k, v));\n  }\n\n  open(id) { this.setState({ active: id, navOpen: false }); }\n  tapOpen(id) { if (this.state.isMobile) this.open(id); }\n\n  renderVals() {\n    const active = this.state.active;\n    const v = {};\n\n    const caseData = [\n      {\n        id: 'csCustomFields', name: 'Custom Fields', file: 'Custom Fields.case', tag: 'Enterprise · 2024', dot: '#7c3aed',\n        oneLiner: 'A flexible data architecture that lets property managers model anything — without filing an engineering ticket.',\n        role: 'Lead Product Designer', year: '2024', team: '2 PM · 5 Eng',\n        problem: 'Property managers were boxed into rigid, predefined data structures. Every new field they needed meant an engineering ticket and weeks of waiting, so teams quietly retreated to spreadsheets and free-text notes. Critical data fragmented across the org, reporting broke, and the product slowly stopped reflecting how each portfolio actually worked.',\n        process: 'I interviewed 18 property managers running portfolios from 50 to 5,000 units and mapped more than 40 \"shadow workflows\" living entirely outside the product. We prototyped three models — from a lightweight key/value tagger to a full schema builder — and tested them with 12 admins. The middle path won: structured field types with strong guardrails that non-technical users could trust.',\n        solution: 'The result is a field builder with typed inputs — text, number, date, select, and formula — plus validation rules and per-role visibility. Fields flow automatically into reports, filters, and the public API, and a live preview shows exactly how each field will appear before it ever ships. Power without the foot-guns.',\n        metrics: [{ n: '73%', l: 'fewer custom-field engineering tickets' }, { n: '4.2k', l: 'fields created in the first quarter' }, { n: '31%', l: 'faster onboarding for new portfolios' }],\n      },\n      {\n        id: 'csAgenticAI', name: 'Agentic AI', file: 'Agentic AI.case', tag: 'AI · 2024 · Featured', dot: '#ff5a1f',\n        oneLiner: 'Reimagining property management for an AI-first era — software that anticipates instead of just reacting.',\n        role: 'Lead Product Designer', year: '2024', team: '3 PM · 8 Eng · 2 DS',\n        problem: 'The product had grown into hundreds of screens. Even expert users spent more time hunting for information than acting on it — routine decisions around renewals, maintenance triage, and delinquency meant stitching together five different tools. We asked a simple question: what if the system did the stitching?',\n        process: 'We ran a six-week \"agent studio\" with engineering and data science. I helped define a taxonomy of jobs the system could safely automate versus
